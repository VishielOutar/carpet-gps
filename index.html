<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CarPet</title>
<style>
  :root {
    --bg: #0c0c10;
    --card: #16161c;
    --accent: #a2bafc;
    --accent2: #2ec4d8;
    --text: #f0f0f4;
    --muted: #8a8a96;
    --good: #7ed321;
    --bad: #e8506e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 18px;
    gap: 18px;
  }
  h1 { font-size: 22px; letter-spacing: 1px; margin-top: 8px; }
  .cat { font-size: 46px; }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 420px;
    border: 1px solid #24242c;
  }
  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .status {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; margin-bottom: 4px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--bad); transition: background .3s; }
  .dot.on { background: var(--good); }
  button {
    width: 100%;
    padding: 16px;
    font-size: 17px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #0c0c10;
    margin-top: 14px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  button:active { transform: scale(.98); }
  button:disabled { opacity: .4; }
  button.secondary { background: #24242c; color: var(--text); }
  .readout {
    display: flex; justify-content: space-around; text-align: center;
    margin-top: 18px;
  }
  .readout .val { font-size: 38px; font-weight: 700; }
  .readout .unit { font-size: 13px; color: var(--muted); letter-spacing: 1px; }
  .accent  { color: var(--accent); }
  .accent2 { color: var(--accent2); }

  /* pet stats */
  .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .stat-label { font-size: 14px; width: 72px; flex-shrink: 0; }
  .bar-bg { flex: 1; height: 8px; background: #24242c; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .6s cubic-bezier(.4,0,.2,1); }
  .bar-fill.hunger { background: var(--accent); }
  .bar-fill.happy  { background: var(--accent2); }
  .stat-num { font-size: 13px; font-weight: 700; width: 28px; text-align: right; }
  .level-row { display: flex; align-items: center; gap: 10px; margin-top: 2px; }
  .level-label { font-size: 18px; font-weight: 700; color: var(--accent); width: 56px; }
  .xp-bg { flex: 1; height: 6px; background: #24242c; border-radius: 3px; overflow: hidden; }
  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }
  .xp-label { font-size: 11px; color: var(--muted); width: 52px; text-align: right; }

  /* difficulty */
  .diff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .diff-btn {
    padding: 14px 6px; font-size: 13px; font-weight: 700; letter-spacing: 1px;
    border: 2px solid #24242c; border-radius: 10px;
    background: #24242c; color: var(--muted);
    cursor: pointer; transition: all .2s; margin-top: 0; width: auto;
  }
  .diff-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(162,186,252,.08); }
  .diff-btn:active { transform: scale(.96); }
  .diff-desc { font-size: 13px; color: var(--muted); line-height: 1.5; min-height: 38px; }
  .diff-note { font-size: 12px; color: var(--muted); margin-top: 10px; opacity: 0.6; }

  /* log */
  .log {
    font-size: 12px; color: var(--muted);
    background: #0a0a0e; border-radius: 10px; padding: 12px;
    height: 120px; overflow-y: auto; margin-top: 14px;
    font-family: ui-monospace, monospace; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word;
  }
  .hint { font-size: 13px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="cat">🐱</div>
  <h1>CARPET</h1>

  <!-- Connection + GPS card -->
  <div class="card">
    <div class="status">
      <div class="dot" id="bleDot"></div>
      <span id="bleStatus">Not connected to CarPet</span>
    </div>
    <div class="status">
      <div class="dot" id="gpsDot"></div>
      <span id="gpsStatus">GPS off</span>
    </div>
    <button id="connectBtn">Connect to CarPet</button>
    <button id="gpsBtn" class="secondary" disabled>Start GPS</button>
    <div class="readout">
      <div>
        <div class="val accent" id="speedVal">0</div>
        <div class="unit">MPH</div>
      </div>
      <div>
        <div class="val accent2" id="distVal">0.0</div>
        <div class="unit">MILES</div>
      </div>
    </div>
  </div>

  <!-- Pet stats card — shown after connecting if firmware supports it -->
  <div class="card" id="petCard" style="display:none">
    <div class="section-title">Pet Status</div>
    <div class="stat-row">
      <div class="stat-label">🍖 Hunger</div>
      <div class="bar-bg"><div class="bar-fill hunger" id="hungerBar" style="width:0%"></div></div>
      <div class="stat-num accent" id="hungerVal">—</div>
    </div>
    <div class="stat-row" style="margin-bottom:18px">
      <div class="stat-label">😊 Happy</div>
      <div class="bar-bg"><div class="bar-fill happy" id="happyBar" style="width:0%"></div></div>
      <div class="stat-num accent2" id="happyVal">—</div>
    </div>
    <div class="level-row">
      <div class="level-label" id="levelVal">LVL —</div>
      <div class="xp-bg"><div class="xp-fill" id="xpBar" style="width:0%"></div></div>
      <div class="xp-label" id="xpVal">— / —</div>
    </div>
  </div>

  <!-- Difficulty card — always shown after connecting -->
  <div class="card" id="diffCard" style="display:none">
    <div class="section-title">Difficulty</div>
    <div class="diff-grid">
      <button class="diff-btn" data-d="0">SLOW</button>
      <button class="diff-btn" data-d="1">CASUAL</button>
      <button class="diff-btn" data-d="2">RACER</button>
    </div>
    <div class="diff-desc" id="diffDesc"></div>
    <div class="diff-note" id="diffNote"></div>
  </div>

  <!-- Log card -->
  <div class="card">
    <div class="log" id="log">Ready. Tap "Connect to CarPet" to begin.</div>
    <div class="hint">Open this page in <b>Bluefy</b> (iPhone) or Chrome (Android). Connect to CarPet, then Start GPS. Keep this page open while driving.</div>
  </div>

<script>
const SERVICE_UUID  = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const GPS_UUID      = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
const SETTINGS_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
const STATS_UUID    = "6e400004-b5a3-f393-e0a9-e50e24dcca9e";

let device = null;
let gpsChar = null, settingsChar = null, statsChar = null;
let watchId = null;
let totalMiles = 0, lastPos = null;
let currentDiff = 1;

// GPS throttle — only send to device when speed changes >1 mph,
// distance changes >0.01 miles, OR 3 seconds have passed.
// Cuts BLE traffic dramatically and reduces display glitching.
let lastSentSpeed = -99, lastSentDist = -99, lastSentTime = 0;

const DIFF_LABELS = ['SLOW', 'CASUAL', 'RACER'];
const DIFF_DESC = [
  'City & short trips. Small distances and gentle driving keeps your pet happy.',
  'Everyday driving. Balanced hunger and happiness for regular commuters.',
  'Highway & spirited driving. Your pet needs more miles and speed events to stay satisfied.'
];

const $ = id => document.getElementById(id);

function log(msg) {
  const el = $('log');
  const t = new Date().toLocaleTimeString();
  el.textContent = `[${t}] ${msg}\n` + el.textContent;
}

// ── Difficulty UI ──
function setDiffUI(d) {
  currentDiff = d;
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.d) === d);
  });
  $('diffDesc').textContent = DIFF_DESC[d];
}
setDiffUI(1);

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.onclick = async () => {
    const d = parseInt(btn.dataset.d);
    setDiffUI(d);
    if (settingsChar) {
      try {
        await settingsChar.writeValue(new TextEncoder().encode(String(d)));
        log(`Difficulty → ${DIFF_LABELS[d]}`);
      } catch(e) { log('Difficulty write failed: ' + e.message); }
    } else {
      log(`Difficulty set to ${DIFF_LABELS[d]} — update firmware to sync to device`);
    }
  };
});

// ── Stats notification handler ──
function onStats(event) {
  const val = new TextDecoder().decode(event.target.value);
  const get = key => { const m = val.match(new RegExp(key + ':(-?\\d+\\.?\\d*)')); return m ? parseFloat(m[1]) : null; };
  const h = get('H'), p = get('P'), l = get('L');
  const x = get('X'), n = get('N'), d = get('D');
  if (h !== null) { $('hungerBar').style.width = h + '%'; $('hungerVal').textContent = h; }
  if (p !== null) { $('happyBar').style.width  = p + '%'; $('happyVal').textContent  = p; }
  if (l !== null) $('levelVal').textContent = 'LVL ' + l;
  if (x !== null && n !== null && n > 0) {
    $('xpBar').style.width = Math.min(100, (x / n * 100)) + '%';
    $('xpVal').textContent = x + ' / ' + n;
  }
  if (d !== null && d !== currentDiff) setDiffUI(d);
}

// ── BLE connect ──
$('connectBtn').onclick = async () => {
  try {
    log("Scanning for CarPet...");
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: "CarPet" }],
      optionalServices: [SERVICE_UUID]
    });
    device.addEventListener('gattserverdisconnected', onDisconnect);

    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);

    gpsChar = await service.getCharacteristic(GPS_UUID);
    log("GPS ready");

    $('diffCard').style.display = '';

    try {
      settingsChar = await service.getCharacteristic(SETTINGS_UUID);
      log("Settings ready — difficulty syncs to device");
      $('diffNote').textContent = '';
    } catch(e) {
      log("No settings characteristic — difficulty selection is local only until firmware update");
      $('diffNote').textContent = "Update firmware to sync difficulty to the device.";
    }

    try {
      statsChar = await service.getCharacteristic(STATS_UUID);
      statsChar.addEventListener('characteristicvaluechanged', onStats);
      await statsChar.startNotifications();
      log("Pet stats streaming");
      $('petCard').style.display = '';
    } catch(e) {
      log("No stats characteristic — update firmware for live pet stats");
    }

    $('bleDot').classList.add('on');
    $('bleStatus').textContent = "Connected to CarPet";
    $('connectBtn').textContent = "Connected ✓";
    $('connectBtn').disabled = true;
    $('gpsBtn').disabled = false;

  } catch(e) { log("Error: " + e.message); }
};

function onDisconnect() {
  log("Disconnected");
  $('bleDot').classList.remove('on');
  $('bleStatus').textContent = "Not connected to CarPet";
  $('connectBtn').textContent = "Connect to CarPet";
  $('connectBtn').disabled = false;
  $('gpsBtn').disabled = true;
  $('petCard').style.display = 'none';
  $('diffCard').style.display = 'none';
  gpsChar = null; settingsChar = null; statsChar = null;
  lastSentSpeed = -99; lastSentDist = -99; lastSentTime = 0;
}

// ── GPS ──
$('gpsBtn').onclick = () => {
  if (watchId === null) {
    if (!navigator.geolocation) { log("Geolocation not supported"); return; }
    watchId = navigator.geolocation.watchPosition(onGps, onGpsErr,
      { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
    $('gpsBtn').textContent = "Stop GPS";
    $('gpsDot').classList.add('on');
    $('gpsStatus').textContent = "GPS active";
    log("GPS started");
  } else {
    navigator.geolocation.clearWatch(watchId); watchId = null;
    $('gpsBtn').textContent = "Start GPS";
    $('gpsDot').classList.remove('on');
    $('gpsStatus').textContent = "GPS off";
    log("GPS stopped");
  }
};

function onGps(pos) {
  let mph = 0;
  if (pos.coords.speed != null && !isNaN(pos.coords.speed))
    mph = pos.coords.speed * 2.23694;
  if (lastPos) {
    const d = haversine(lastPos.latitude, lastPos.longitude,
                        pos.coords.latitude, pos.coords.longitude);
    if (d < 0.5) totalMiles += d;
  }
  lastPos = { latitude: pos.coords.latitude, longitude: pos.coords.longitude };
  $('speedVal').textContent = Math.round(mph);
  $('distVal').textContent  = totalMiles.toFixed(1);
  sendGps(mph, totalMiles);
}

function onGpsErr(e) { log("GPS error: " + e.message); }

function haversine(lat1, lon1, lat2, lon2) {
  const R = 3958.8, r = Math.PI / 180;
  const dLat = (lat2-lat1)*r, dLon = (lon2-lon1)*r;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Throttled GPS send — only transmit when something meaningful changed
// or 3 seconds have passed. Keeps BLE traffic low so the display stays smooth.
async function sendGps(speed, miles) {
  if (!gpsChar) return;
  const now = Date.now();
  const speedChanged = Math.abs(speed - lastSentSpeed) >= 1.0;
  const distChanged  = Math.abs(miles - lastSentDist)  >= 0.01;
  const timedOut     = (now - lastSentTime) >= 3000;
  if (!speedChanged && !distChanged && !timedOut) return;
  lastSentSpeed = speed;
  lastSentDist  = miles;
  lastSentTime  = now;
  try {
    await gpsChar.writeValue(new TextEncoder().encode(
      `S:${speed.toFixed(1)},D:${miles.toFixed(2)}`));
  } catch(e) { log("GPS send failed: " + e.message); }
}
</script>
</body>
</html>
